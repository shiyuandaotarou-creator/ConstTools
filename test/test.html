<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    ここはテストですがまだ何もないようです。
    いずれ何かができるので10億年ぐらいまっていただけますでしょうか？
    <button id ="yes">仕方ないから待ってやるか</button>
    <button id ="no">ふざけんな大気圏にとばすぞ</button>
    <div id = "textarea"><p id="text"></p><img src="../images/home.png" alt="" class = "button" id="toHome" onclick="location.href = '../index.html'"></div>
</body>
<style>
    .button{
        position: absolute;
        width: 10vh;
        bottom: 0%;
        display:none;
    }
    #yes{
        position:absolute;
        top: 200px;
        left:0px;
    }
    #no{
        position: absolute;
        top: 200px;
        left: 200px;
    }
    #textarea{
        position:absolute;
        width: 100%;
        height: 30%;
        top: 50%;
        left: 0;
        display: flex;
        justify-content: center;
        align-items: center;
    }
</style>
<script>
    const yes = document.getElementById("yes");
    const no = document.getElementById("no");
    const text = document.getElementById("text");
    const textarea = document.getElementById("textarea");
    const toHome = document.getElementById("toHome");
    yes.onclick = function(){
        text.textContent = "よろしい。寛大な選択に感謝を。";
        textarea.style.backgroundColor = "green";
        toHome.style.display = "block";
    };
    no.onclick = function(){
        text.textContent ="警告：あなたの家はじゃがいもミサイルによってロックオンされています";
        textarea.style.backgroundColor = "red";
    }
</script>
</html>
